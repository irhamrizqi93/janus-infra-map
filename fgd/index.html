.cross{width:26px;height:26px;flex:0 0 auto}

h1{font-size:25px;font-weight:800;letter-spacing:-.4px;line-height:1.15}

.role{border:1.5px solid var(--line);border-radius:13px;padding:15px 13px;text-align:left;background:var(--surface);cursor:pointer;transition:.15s}

.qtag{font-size:10px;font-weight:800;color:var(--ink4);letter-spacing:.04em;text-transform:uppercase;display:inline-block}
.mtag{font-size:9.5px;font-weight:700;color:var(--ink4);float:right}
.qn{font-size:11px;font-weight:600;color:var(--ink4);margin-top:4px}
.q{font-size:19px;font-weight:800;letter-spacing:-.3px;margin:5px 0 14px;line-height:1.24}
.hint{font-size:11.5px;color:var(--ink3);margin:-6px 0 13px}

.opt .box svg{width:12px;height:12px;opacity:0}

.rbtn.on{border-color:var(--ablue);background:var(--ablue);color:#fff}
.rscale{display:flex;justify-content:space-between;font-size:11px;color:var(--ink4);margin-bottom:8px}
textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:15px;font-family:inherit;color:var(--ink)}

.pickc{cursor:pointer;transition:.12s;position:relative}

.pickc.on .fname{background:var(--green);color:var(--navy)}

.pickcount.max{color:var(--green)}
.bar{position:absolute;left:0;right:0;bottom:0;padding:14px 20px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--surface) 80%,rgba(255,255,255,0));border-top:1px solid var(--hair)}
.btn{width:100%;border:none;border-radius:13px;padding:15px;font-size:15.5px;font-weight:800;font-family:inherit;background:var(--ablue);color:#fff;cursor:pointer;transition:.08s}
.btn:active{transform:scale(.99)}.btn[disabled]{background:var(--line);color:var(--ink4);cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--ink3);font-weight:700;padding:11px}
.navrow{display:flex;gap:10px}
.navrow .btn{flex:1}
.btn.back2{background:var(--canvas);color:var(--ink2);border:1.5px solid var(--line);flex:0 0 38%}
.done{text-align:center;padding-top:24px}

.sumsec{font-size:11px;font-weight:800;color:var(--ablue);text-transform:uppercase;letter-spacing:.04em;margin:16px 0 4px;text-align:left}
.sumcard{background:var(--canvas);border:1px solid var(--hair);border-radius:13px;padding:4px 15px;text-align:left}
.sumrow{font-size:12px;color:var(--ink2);padding:8px 0;border-top:1px solid var(--hair);display:flex;gap:8px}
.sumrow:first-child{border:none}.sumrow b{color:var(--navy);flex:0 0 auto}
footer{text-align:center;color:var(--ink4);font-size:10.5px;padding:14px}
</style></head>

    +`<div class="pickcount${full?" max":""}">${sel.length}/${it.cap} dipilih${full?" · maks tercapai":""}</div>`;
  b.querySelectorAll(".pickc").forEach(el=>el.onclick=()=>{const f=it.items[el.dataset.j].name,a=st.ans[it.id];
    if(a.includes(f))a.splice(a.indexOf(f),1);else{if(a.length>=it.cap)return;a.push(f);}renderQ();});
  setNext(it);
 }else if(it.type==="multi"){
  const sel=st.ans[it.id],cap=it.cap||0;
  b.innerHTML=it.o.map((o,j)=>`<div class="opt${sel.includes(o)?" sel":""}" data-j="${j}"><span class="box">${CK}</span>${o}</div>`).join("")
   +(cap?`<div class="pickcount${sel.length>=cap?" max":""}">${sel.length}/${cap} dipilih${sel.length>=cap?" · maks":""}</div>`:"");
  b.querySelectorAll(".opt").forEach(el=>el.onclick=()=>{const o=it.o[el.dataset.j],a=st.ans[it.id];
    if(a.includes(o))a.splice(a.indexOf(o),1);else{if(cap&&a.length>=cap)return;a.push(o);}renderQ();});
  setNext(it);
 }else if(it.type==="open"){ // isian manual (ketik) — masukan personal
  b.innerHTML=`<textarea id="opentx" rows="4" placeholder="Tulis jawaban Anda di sini (opsional)"></textarea>`;
  const ta=$("#opentx");ta.value=st.ans[it.id]||"";ta.oninput=()=>{st.ans[it.id]=ta.value;};
  setNext(it);
 }else{ // single — pilih dulu, lalu tombol Lanjut (tak kaget auto-loncat; konsisten semua tipe)
  b.innerHTML=it.o.map((o,j)=>`<div class="opt${st.ans[it.id]===o?" sel":""}" data-j="${j}"><span class="dot"></span>${o}</div>`).join("");
  b.querySelectorAll(".opt").forEach(el=>el.onclick=()=>{st.ans[it.id]=it.o[el.dataset.j];renderQ();});
  setNext(it);
 }
}
function fmt(it,a,o){let s;
 if(a==null||a===""||(Array.isArray(a)&&!a.length))s="—";
 else if(it.type==="pick")s=a.map(x=>"⭐"+x).join(" · ");
 else if(it.type==="rank")s=a.map((x,k)=>`${k+1}.${x}`).join(" · ");
 else if(it.type==="multi")s=a.join(" · ");
 else s=a;
 if(o&&o.trim())s=(s==="—"?"":s+" · ")+"Lainnya: "+o.trim();
 return s;}
// payload utk quiz_capture.py — {quiz,role,answers:[{qid,type,value,other}]}. ANONIM. qid = id pertanyaan
// yang BENAR-BENAR dijawab (jalur cabang), bukan semua pertanyaan.
function payload(){const qz=(SPEC.meta&&SPEC.meta.id)||"kuis";
 return{quiz:qz,role:st.role,answers:st.hist.map(id=>{const it=byId(id),a=st.ans[id];
  return{qid:id,type:it.type,value:(a===undefined||a==="")?null:a,other:null};})};}
function saveLocal(){try{const qz=(SPEC.meta&&SPEC.meta.id)||"kuis";
  localStorage.setItem(qz+"_"+st.role+"_"+Date.now(),JSON.stringify(payload()));}catch(e){}}
function exportJSON(){const qz=(SPEC.meta&&SPEC.meta.id)||"kuis";
 const blob=new Blob([JSON.stringify(payload(),null,2)],{type:"application/json"});
 const u=URL.createObjectURL(blob),a=document.createElement("a");
 a.href=u;a.download=qz+"-"+st.role+".json";a.click();URL.revokeObjectURL(u);}
function copyJSON(){const t=JSON.stringify(payload());
 (navigator.clipboard?navigator.clipboard.writeText(t):Promise.reject()).then(
  ()=>{const b=$("#cpy");if(b){b.textContent="Tersalin ✓";setTimeout(()=>b.textContent="Salin Jawaban 📋",1500);}},
  ()=>alert("Salin manual:\n\n"+t));}
// Kirim LANGSUNG ke backend (anonim, peserta tak forward apa-apa). URL dari backend.json
// (di-update watchdog tunnel). Gagal (tunnel mati) → fallback Simpan/Salin (nol data hilang).
function submitOnline(){const btn=$("#send");if(btn){btn.disabled=true;btn.textContent="Mengirim…";}
 fetch("../backend.json",{cache:"no-store"}).then(r=>r.json()).then(cfg=>{
   if(!cfg||!cfg.url)throw 0;
   return fetch(cfg.url.replace(/\/+$/,"")+"/submit",{method:"POST",
     headers:{"Content-Type":"application/json"},body:JSON.stringify(payload())});
 }).then(r=>r.json()).then(d=>{if(!d||!d.ok)throw 0;
   $("#sendwrap").innerHTML='<div style="text-align:center;color:var(--ink2);font-size:13.5px;font-weight:800;padding:4px 0">Jawaban terkirim. Terima kasih.<br><span style="font-weight:500;color:var(--ink4);font-size:11.5px">Jawaban Anda anonim & tersimpan aman</span></div>'
     +'<button class="btn ghost" onclick="location.reload()">Isi ulang (peserta lain)</button>';
 }).catch(()=>{if(btn){btn.disabled=false;btn.textContent="Coba kirim lagi 🔁";}
   const fb=$("#fallback");if(fb)fb.style.display="flex";});}
function finish(){$("#prog").style.width="100%";const rn=ROLES.find(r=>r.id===st.role).name;
 saveLocal();
 let out=`<div class="sumsec">Peran: ${rn} · anonim</div><div class="sumcard">`;
 st.hist.forEach(id=>{const it=byId(id);
  out+=`<div class="sumrow"><b>${it.tag||id}:</b> <span>${fmt(it,st.ans[id])}</span></div>`;});
 out+='</div>';
 $("#sum").innerHTML=out;
 bar.innerHTML=`<div id="sendwrap" style="display:flex;flex-direction:column;gap:8px">
   <button class="btn" id="send" onclick="submitOnline()">Kirim Jawaban →</button>
   <div id="fallback" style="display:none;flex-direction:column;gap:8px">
     <div style="text-align:center;font-size:11px;color:var(--ink4)">Pengiriman gagal — simpan lalu kirim manual ke Mas Irham:</div>
     <button class="btn ghost" onclick="exportJSON()">Simpan Jawaban 💾</button>
     <button class="btn ghost" id="cpy" onclick="copyJSON()">Salin Jawaban 📋</button>
   </div></div>`;
 show("#s-done");
}
</script>
</body></html>
